  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
    :root {
      --bg:#f4f5f7; --surface:#fff; --surface2:#f8f9fc;
      --border:#e4e7ef; --border2:#d0d5e8;
      --accent:#2563eb; --accent-light:#eff4ff;
      --green:#059669; --green-light:#ecfdf5;
      --red:#dc2626; --red-light:#fef2f2;
      --amber:#d97706; --amber-light:#fffbeb;
      --text:#111827; --text-muted:#6b7280; --text-dim:#9ca3af;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

    /* 헤더 */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo-text{font-size:17px;font-weight:700;letter-spacing:-.3px;}
    .logo-sub{font-size:11px;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:10px;}
    .period-badge{font-size:12px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:6px;font-weight:500;}
    .month-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;outline:none;height:34px;}
    .month-select:focus{border-color:var(--accent);}

    /* 레이아웃 */
    main{padding:24px 32px;max-width:1400px;margin:0 auto;}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px 28px;}
    .kpi-label{font-size:17px;color:var(--text-muted);font-weight:600;margin-bottom:10px;}
    .kpi-row{display:flex;align-items:baseline;gap:5px;}
    .kpi-value{font-family:'Noto Sans KR',sans-serif;font-size:34px;font-weight:700;letter-spacing:-.5px;}
    .kpi-unit{font-size:14px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;}
    .kpi-sub{font-size:12px;color:var(--text-muted);margin-top:6px;}
    .kpi-change{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px;margin-top:6px;}
    .kpi-change.down{background:var(--green-light);color:var(--green);}
    .kpi-change.up{background:var(--red-light);color:var(--red);}

    /* 섹션 타이틀 */
    .section-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;margin-top:4px;display:flex;align-items:center;gap:10px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* 메인 그리드 */
    .main-grid{display:grid;grid-template-columns:1fr 330px;gap:16px;margin-bottom:20px;}

    /* 카드 공통 */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-size:14px;font-weight:700;}
    .card-sub{font-size:11px;color:var(--text-muted);}

    /* 테이블 */
    table{width:100%;border-collapse:collapse;}
    thead th{padding:9px 16px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;}
    thead th.num{text-align:right;}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--surface2);}
    tbody tr.vacant{opacity:.5;}
    td{padding:11px 16px;font-size:13px;white-space:nowrap;}
    td.num{text-align:right;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;}
    tfoot td{padding:11px 16px;font-size:13px;font-weight:700;background:var(--surface2);border-top:2px solid var(--border2);}
    tfoot td.num{text-align:right;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;}

    .floor-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 8px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--text-muted);font-weight:600;}
    .tenant-name{font-weight:500;font-size:13px;color:var(--text);}

    .status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:600;white-space:nowrap;}
    .status-badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
    .status-badge.active{background:var(--accent-light);color:var(--accent);}
    .status-badge.vacant{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}
    .status-badge.quarterly{background:var(--amber-light);color:var(--amber);}

    /* 사이드 */
    .side-panel{display:flex;flex-direction:column;gap:14px;}
    .info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
    .info-card-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .water-amount{font-family:'Noto Sans KR',sans-serif;font-size:26px;font-weight:700;color:var(--green);}
    .water-amount .unit{font-size:13px;color:var(--text-muted);margin-left:2px;font-family:'Noto Sans KR',sans-serif;}
    .water-period{font-size:11px;color:var(--text-muted);margin-top:4px;margin-bottom:14px;}

    .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;border:none;transition:all .15s;width:100%;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#1d4ed8;}
    .btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);}

    .vacant-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .vacant-item:last-of-type{border-bottom:none;}

    /* 차트 */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
    .chart-body{padding:18px 20px;}
    .chart-container{position:relative;height:210px;}

    /* 증감 */
    .change-up{color:var(--red);font-weight:600;}
    .change-down{color:var(--green);font-weight:600;}
    .change-zero{color:var(--text-dim);}

    /* 고지서 */
    .notice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:32px;}
    .notice-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:box-shadow .15s,border-color .15s;}
    .notice-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);border-color:var(--accent);}
    .notice-floor{font-size:11px;color:var(--text-muted);margin-bottom:3px;font-weight:500;}
    .notice-tenant{font-size:14px;font-weight:700;margin-bottom:10px;}
    .notice-total{font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;color:var(--accent);margin-bottom:10px;}
    .notice-breakdown{font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:3px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);}
    .notice-row{display:flex;justify-content:space-between;}
    .notice-val{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--text);font-weight:500;}

    @media(max-width:1100px){.main-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.chart-grid{grid-template-columns:1fr;}}
    @media(max-width:600px){main{padding:14px;}header{padding:0 14px;}.kpi-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<header>
  <div>
    <div class="logo-text">명진빌딩 자산관리</div>
    <div class="logo-sub">서울특별시 강남구 봉은사로 203</div>

</header>

<main>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">⚡ 당월 전기요금</div>
      <div class="kpi-row"><div class="kpi-value" id="kpiElec">-</div><div class="kpi-unit">원</div></div>

      <div style="margin-top:12px" id="waterBillArea"></div>
    </div>

  <div class="section-title">임대현황</div>
  <div class="main-grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">층별 임대현황</span>
        <span class="card-sub">임대중 <strong id="occupiedCount" style="color:var(--accent)">-</strong> / 전체 7개 층</span>

    <div class="side-panel">

        <div id="arrearsInfo"></div>
        
        <div id="arrearsDetail" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">미수금 상세 내역</div>
          <div id="arrearsDetailContent"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">전기요금 분석</div>
  <div class="chart-grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">전체 전기요금 추이</span>
        <span class="card-sub">최근 4개월</span>
      </div>
      <div class="chart-body"><div class="chart-container"><canvas id="totalElecChart"></canvas></div></div>
    </div>
    <div class="card">

        <span class="card-title">층별 전기사용량 비교</span>
        <span class="card-sub" id="elecMonthLabel">-</span>
      </div>
      <div class="chart-body"><div class="chart-container"><canvas id="floorElecChart"></canvas></div></div>
    </div>
  </div>

  <div class="section-title">층별 전기료 상세</div>
  <div class="card" style="margin-bottom:24px">
    <table>
      <thead>
        <tr>
          <th>층</th><th>임차인</th>
          <th class="num">전월검침</th><th class="num">당월검침</th>
          <th class="num">사용량 (kWh)</th><th class="num">전월대비</th><th class="num">청구금액</th>
        </tr>
      </thead>
      <tbody id="elecTable"></tbody>
    </table>
  </div>

  <div class="section-title">고지서 발행</div>
  <div class="notice-grid" id="noticeGrid"></div>
</main>

// ─── 세금계산서 발급 매핑 ────────────────────────────────────────────────
// items: rent=임대료, maint=관리비, elec=전기사용료
// cycle: monthly=매월 발급, quarterly=분기 발급 (분기 첫 달에 직전 분기 청구)

  ]}
];
const SAMPLE_WATER_DATA = [
  {year:2026,month:1,label:"1월",amount:185000,period:"25년 11월 23일 ~ 25년 12월 22일"},
  {year:2026,month:2,label:"2월",amount:192000,period:"25년 12월 23일 ~ 26년 01월 22일"},
  {year:2026,month:3,label:"3월",amount:200050,period:"26년 01월 23일 ~ 26년 02월 22일"}
];

// ─── 동적 데이터 로딩 ────────────────────────────────────────────────────
let ELEC_DATA = [];
let WATER_DATA = [];
let currentMonthIdx = 0;

async function loadData() {
  try {
    const res = await fetch('bills/data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json 없음');
    const data = await res.json();
    ELEC_DATA = data.months || [];
    WATER_DATA = data.water || [];
    currentMonthIdx = ELEC_DATA.length - 1;
  } catch(e) {
    // 파일 없으면 하드코딩 샘플 데이터 사용
    console.warn('data.json 로드 실패, 샘플 데이터 사용:', e);
    ELEC_DATA = SAMPLE_ELEC_DATA;
    WATER_DATA = SAMPLE_WATER_DATA;
    currentMonthIdx = ELEC_DATA.length - 1;
  }
  renderAll();
}
let totalChartInst = null, floorChartInst = null;

const fmt = n => n===0 ? '-' : Math.round(n).toLocaleString('ko-KR');
const fmtN = n => n.toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
const pct = (a,b) => b===0 ? null : (a-b)/b*100;

function renderMonthNav() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = ELEC_DATA.map((d,i) =>
    `<option value="${i}" ${i===currentMonthIdx?'selected':''}>${d.year}년 ${d.label}</option>`
  ).join('');
}

function onMonthChange(idx) {
  currentMonthIdx = parseInt(idx);
  renderAll();
}

function renderKPI() {
  const cur = ELEC_DATA[currentMonthIdx];
  const prev = currentMonthIdx>0 ? ELEC_DATA[currentMonthIdx-1] : null;
  let totalRent=0, totalMaint=0;
  TENANTS.forEach(t=>{ if(t.status==='공실') return; totalRent+=t.rent; totalMaint+=t.maint; });
  document.getElementById('kpiElec').textContent = fmt(cur.total_bill);
  document.getElementById('currentPeriod').textContent = `${cur.year}년 ${cur.label}`;

  const ec = document.getElementById('kpiElecChange');
  if(prev){
    const diff=cur.total_bill-prev.total_bill, p=pct(cur.total_bill,prev.total_bill);
    const sign=diff>0?'+':'';
    ec.textContent=`전월 대비 ${sign}${p.toFixed(1)}%  (${fmt(prev.total_bill)}원 → ${fmt(cur.total_bill)}원)`;
    ec.className='kpi-change '+(diff>0?'up':'down');
  } else { ec.textContent='이전 데이터 없음'; ec.className='kpi-change'; }

  const w = WATER_DATA.find(w=>w.year===cur.year&&w.month===cur.month)||WATER_DATA[WATER_DATA.length-1];
  document.getElementById('kpiWater').textContent = fmt(w.amount);
  document.getElementById('kpiWaterPeriod').textContent = `사용기간: ${w.period}`;

  // 수도요금 전월대비
  const prevW = WATER_DATA.find(wd => wd.year === w.year && wd.month === w.month - 1)
             || (w.month === 1 ? null : null);
  const wc = document.getElementById('kpiWaterChange');
  const prevWater = WATER_DATA.find(wd => wd.month === w.month - 1 && wd.year === w.year)
                 || (w.month === 1 ? WATER_DATA.find(wd => wd.month === 12 && wd.year === w.year - 1) : null);
  if (prevWater) {
    const wd = w.amount - prevWater.amount;
    const wp = pct(w.amount, prevWater.amount);
    const ws = wd > 0 ? '+' : '';
    wc.textContent = `전월 대비 ${ws}${wp.toFixed(1)}%  (${fmt(prevWater.amount)}원 → ${fmt(w.amount)}원)`;
    wc.className = 'kpi-change ' + (wd > 0 ? 'up' : 'down');
  } else { wc.textContent = '이전 데이터 없음'; wc.className = 'kpi-change'; }

  // 전기요금 사용기간: 전월 16일 ~ 선택월 15일 자동 계산
  const elecPeriodEl = document.getElementById('kpiElecPeriod');
  const prevM = cur.month === 1 ? 12 : cur.month - 1;
  const prevY = cur.month === 1 ? cur.year - 1 : cur.year;
  const elecPeriod = `${String(prevY).slice(2)}년 ${prevM}월 16일 ~ ${String(cur.year).slice(2)}년 ${cur.month}월 15일`;
  elecPeriodEl.textContent = `사용기간: ${elecPeriod}`;
  elecPeriodEl.style.display = '';

  // 임대중 카운트 (f1, f3, f4, f56 = 4개)
  document.getElementById('occupiedCount').textContent = TENANTS.filter(t=>['f1','f3','f4','f56'].includes(t.id)).length;

  // 청구서 원본 PDF 링크 연결
  const yr = String(cur.year);
  const mo = String(cur.month).padStart(2,'0');
  const elecPath = `bills/${yr}_${mo}_전기요금.pdf`;
  const waterPath = `bills/${yr}_${mo}_수도요금.pdf`;

  function billBtn(href, label) {
    return `<a href="${href}" download style="text-decoration:none">
      <button class="btn btn-outline" style="font-size:11px;padding:6px 12px">📄 ${label} 원본</button>
    </a>`;
  }
  function billMissing(label) {
    return `<span style="font-size:11px;color:var(--text-dim)">📂 ${label} 파일 없음</span>`;
  }

  // fetch로 파일 존재 여부 확인 (Cloudflare Pages 환경에서만 동작)
  Promise.allSettled([
    fetch(elecPath, {method:'HEAD'}),
    fetch(waterPath, {method:'HEAD'})
  ]).then(([elecRes, waterRes]) => {
    const elecOk = elecRes.status === 'fulfilled' && elecRes.value.ok;
    const waterOk = waterRes.status === 'fulfilled' && waterRes.value.ok;
    document.getElementById('elecBillArea').innerHTML = elecOk ? billBtn(elecPath,'전기요금') : billMissing('전기요금');
    document.getElementById('waterBillArea').innerHTML = waterOk ? billBtn(waterPath,'수도요금') : billMissing('수도요금');
  }).catch(() => {
    // file:// 로컬 환경 - 그냥 링크 표시
    document.getElementById('elecBillArea').innerHTML = billBtn(elecPath,'전기요금');
    document.getElementById('waterBillArea').innerHTML = billBtn(waterPath,'수도요금');
  });
}

// DSRK 분기납: 현재 월이 속한 분기의 첫 달에 직전 분기 청구분 발급
function getDsrkInvoiceContext(year, month) {
  const quarterIdx = Math.floor((month-1)/3); // 0,1,2,3
  const issueMonth = 3 * quarterIdx + 1; // 1,4,7,10
  let bStart, bEnd;
  if (quarterIdx === 0) { bStart = 10; bEnd = 12; }
  else { bStart = 3*(quarterIdx-1)+1; bEnd = 3*quarterIdx; }
  return {
    issueDate: `${year}.${String(issueMonth).padStart(2,'0')}.01`,
    rentSummary: `${bStart}-${bEnd}월 임대료`,
    maintSummary: `${bStart}-${bEnd}월 관리비`
  };
}

async function generateInvoiceXlsx() {
  if (typeof ExcelJS === 'undefined') {
    alert('ExcelJS 라이브러리를 로드 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const cur = ELEC_DATA[currentMonthIdx]; // 선택된 달 = 전기료 데이터
  if (!cur) { alert('월 데이터가 없습니다.'); return; }
  // 발급월 = 다음 달 (예: 5월 선택 → 6월 양식)
  let month = cur.month + 1, year = cur.year;
  if (month > 12) { month = 1; year++; }

  const wb = new ExcelJS.Workbook();
  const sheetName = `${year}.${String(month).padStart(2,'0')}`;
  const ws = wb.addWorksheet(sheetName);

  // 컬럼 너비
  ws.getColumn('A').width = 2;
  ws.getColumn('B').width = 16.375;
  ws.getColumn('C').width = 12;
  ws.getColumn('D').width = 11;
  ws.getColumn('E').width = 14;
  ws.getColumn('F').width = 12;
  ws.getColumn('G').width = 14;
  ws.getColumn('H').width = 13;
  ws.getColumn('I').width = 17;
  ws.getColumn('J').width = 34.75;

  // 영구 메모 (㈜독한 12월 렌트프리 안내)
  const note = ws.getCell('E1');
  note.value = '* 독한짐 매년 12월 렌트프리 (관리비는 납부)';
  note.font = { name:'맑은 고딕', size:11, color:{argb:'FFFF0000'} };

  // 제목
  const title = ws.getCell('B2');
  title.value = `${month}월 명진빌딩 세금계산서 발급내역`;
  title.font = { name:'맑은 고딕', size:14, bold:true };
  title.alignment = { vertical:'middle' };
  ws.getRow(2).height = 21;

  // 헤더 (B3:J3)
  const headers = ['거래처명','거래처 코드','내용','공급가액','부가세','총액','발행일자','적요','이메일'];
  const headerRow = 3;
  ws.getRow(headerRow).height = 17.25;
  headers.forEach((h, i) => {
    const col = 2 + i; // B=2
    const cell = ws.getCell(headerRow, col);
    cell.value = h;
    cell.font = { name:'맑은 고딕', size:11, bold:true };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFFFF00'} };
    cell.alignment = { horizontal:'center', vertical:'middle' };
    const isFirst = i === 0;
    const isLast = i === headers.length - 1;
    cell.border = {
      top: { style:'medium' },
      bottom: { style:'thin' },
      left: { style: isFirst ? 'medium' : 'thin' },
      right: { style: isLast ? 'medium' : 'thin' }
    };
  });

  // 숫자 포맷
  const numFmt = '_-* #,##0_-;\\-* #,##0_-;_-* "-"_-;_-@_-';

  // 데이터 행 작성
  let row = 4;
  const totalTenants = INVOICE_MAPPING.length;
  let tenantIdx = 0;

  for (const m of INVOICE_MAPPING) {
    const tenant = TENANTS.find(t => t.id === m.tenantId);
    if (!tenant || tenant.status === '공실') { tenantIdx++; continue; }

    // 항목 목록 구성
    const items = [];
    let issueDateOverride = null; // DSRK 분기납 일 때

    if (m.cycle === 'quarterly' && m.tenantId === 'f7') {
      // DSRK 분기납: 발급 달(1, 4, 7, 10월)에만 표시
      if (![1, 4, 7, 10].includes(month)) { tenantIdx++; continue; }
      const ctx = getDsrkInvoiceContext(year, month);
      issueDateOverride = ctx.issueDate;
      if (m.items.includes('rent')) {
        items.push({ label:'임대료', supply: tenant.rent/1.1, summary: ctx.rentSummary });
      }
      if (m.items.includes('maint')) {
        items.push({ label:'관리비', supply: tenant.maint/1.1, summary: ctx.maintSummary });
      }
    } else {
      // 월별 발급
      const defaultIssueDate = `${year}.${String(month).padStart(2,'0')}.01`;
      const isRentFree = (m.rentFreeMonth === month);
      if (m.items.includes('rent') && !isRentFree) {
        items.push({ label:'임대료', supply: tenant.rent/1.1, summary:`${month}월 임대료` });
      }
      if (m.items.includes('maint')) {
        items.push({ label:'관리비', supply: tenant.maint/1.1, summary:`${month}월 관리비` });
      }
      if (m.items.includes('elec')) {
        // 선택된 달의 전기료 = 발급월(다음 달)의 전월 전기료
        const pe = cur.floors.find(f => f.id === m.tenantId);
        if (pe && pe.amount > 0) {
          items.push({ label:'전기사용료', supply: pe.amount/1.1, summary:`${cur.month}월 전기 사용료` });
        }
      }
      // 모든 행 발급일자는 현재 월 1일
      issueDateOverride = defaultIssueDate;
    }

    if (items.length === 0) { tenantIdx++; continue; }

    const isLastTenant = (tenantIdx === totalTenants - 1);
    const startRow = row;
    items.forEach((it, idx) => {
      const isFirstItem = (idx === 0);
      const isLastItem = (idx === items.length - 1);

      ws.getRow(row).height = 25.5;

      // B: 거래처명
      const bCell = ws.getCell(`B${row}`);
      if (isFirstItem) bCell.value = m.invoiceName;
      bCell.font = { name:'맑은 고딕', size:11, bold:true };
      bCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFFFF00'} };
      bCell.alignment = { horizontal:'center', vertical:'middle' };
      bCell.numFmt = numFmt;
      bCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? 'medium' : 'thin' },
        left: { style:'medium' },
        right: { style:'thin' }
      };

      // C: 거래처 코드
      const cCell = ws.getCell(`C${row}`);
      if (isFirstItem) cCell.value = m.code;
      cCell.font = { name:'맑은 고딕', size:11, bold:true };
      cCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFFFF00'} };
      cCell.alignment = { horizontal:'center', vertical:'middle' };
      cCell.numFmt = '0_);[Red]\\(0\\)';
      cCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? 'medium' : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // D: 내용
      const dCell = ws.getCell(`D${row}`);
      dCell.value = it.label;
      dCell.font = { name:'맑은 고딕', size:11 };
      dCell.alignment = { horizontal:'center', vertical:'middle' };
      dCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // E: 공급가액
      const eCell = ws.getCell(`E${row}`);
      eCell.value = Math.round(it.supply);
      eCell.font = { name:'맑은 고딕', size:11 };
      eCell.alignment = { vertical:'middle' };
      eCell.numFmt = numFmt;
      eCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // F: 부가세 (수식)
      const fCell = ws.getCell(`F${row}`);
      fCell.value = { formula: `E${row}*0.1` };
      fCell.font = { name:'맑은 고딕', size:11 };
      fCell.alignment = { vertical:'middle' };
      fCell.numFmt = numFmt;
      fCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // G: 총액 (수식)
      const gCell = ws.getCell(`G${row}`);
      gCell.value = { formula: `E${row}+F${row}` };
      gCell.font = { name:'맑은 고딕', size:11 };
      gCell.alignment = { vertical:'middle' };
      gCell.numFmt = numFmt;
      gCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // H: 발행일자
      const hCell = ws.getCell(`H${row}`);
      hCell.value = issueDateOverride;
      hCell.font = { name:'맑은 고딕', size:11 };
      hCell.alignment = { horizontal:'center', vertical:'middle' };
      hCell.numFmt = '@';
      hCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // I: 적요
      const iCell = ws.getCell(`I${row}`);
      iCell.value = it.summary;
      iCell.font = { name:'맑은 고딕', size:10 };
      iCell.alignment = { vertical:'middle' };
      iCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? (isLastTenant ? 'medium' : 'thin') : 'thin' },
        left: { style:'thin' },
        right: { style:'thin' }
      };

      // J: 이메일
      const jCell = ws.getCell(`J${row}`);
      if (isFirstItem) jCell.value = m.email;
      jCell.font = { name:'맑은 고딕', size:11 };
      jCell.alignment = { horizontal:'center', vertical:'middle' };
      jCell.border = {
        top: { style: isFirstItem ? 'medium' : 'thin' },
        bottom: { style: isLastItem ? 'medium' : 'thin' },
        left: { style:'thin' },
        right: { style:'medium' }
      };

      row++;
    });

    // 병합 (항목 2개 이상일 때만)
    if (items.length > 1) {
      ws.mergeCells(`B${startRow}:B${row-1}`);
      ws.mergeCells(`C${startRow}:C${row-1}`);
      ws.mergeCells(`J${startRow}:J${row-1}`);
    }

    tenantIdx++;
  }

  // 파일 다운로드
  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `명진빌딩_세금계산서_발급_${month}월.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderAll(){renderMonthNav();renderKPI();renderTenantTable();renderElecTable();renderCharts();renderNoticeGrid();renderArrears();renderInvoiceInfo();}

// 시작
loadData();
</script>
<div id="arrearsModal"></div>
</body>
</html>
